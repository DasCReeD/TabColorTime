<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      width: 250px;
      padding: 15px;
      margin: 0;
      background-color: #202124;
      color: #e8eaed;
    }
    h2 {
      margin-top: 0;
      font-size: 16px;
      border-bottom: 1px solid #3c4043;
      padding-bottom: 10px;
      color: #fff;
    }
    .option {
      margin-bottom: 10px;
    }
    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 500;
      font-size: 14px;
    }
    select {
      width: 100%;
      padding: 8px;
      background-color: #303134;
      color: #fff;
      border: 1px solid #5f6368;
      border-radius: 4px;
      font-size: 14px;
    }
    select:focus {
      outline: none;
      border-color: #8ab4f8;
    }
  </style>
</head>
<body>
  <h2>TabLife Settings</h2>
  <div class="option">
    <label for="sortDirection">Heat Map Direction:</label>
    <select id="sortDirection">
      <option value="right">Hot tabs on the Right</option>
      <option value="left">Hot tabs on the Left</option>
    </select>
  </div>
  <script src="popup.js"></script>
</body>
</html>
